<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="砚池">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>砚池 · Ombre Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 登录页 -->
<section id="page-login" class="page page-login">
  <div class="login-stage">
    <div class="login-mark">
      <svg viewBox="0 0 80 80" class="login-seal" aria-hidden="true">
        <rect x="2" y="2" width="76" height="76" fill="none" stroke="currentColor" stroke-width="0.6"/>
        <text x="40" y="50" text-anchor="middle" font-family="Noto Serif SC" font-size="38" fill="currentColor">砚</text>
      </svg>
    </div>
    <h1 class="login-title">Ombre Brain</h1>
    <p class="login-sub">窗竹影摇书案上&nbsp;&nbsp;野泉声入砚池中</p>
    <form id="login-form" class="login-form">
      <label class="field">
        <span class="field-label">用户</span>
        <input type="text" id="login-user" autocomplete="username" required>
      </label>
      <label class="field">
        <span class="field-label">密钥</span>
        <input type="password" id="login-pass" autocomplete="current-password" required>
      </label>
      <p class="login-error" id="login-error"></p>
      <button type="submit" class="btn-primary" id="login-btn">入</button>
    </form>
  </div>
</section>

<!-- 主应用 -->
<section id="page-main" class="page page-main hidden">

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="topbar-inner">
      <button class="iconbtn" id="btn-menu" aria-label="菜单">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
      </button>
      <h1 class="topbar-title">砚池</h1>
      <button class="iconbtn" id="btn-new" aria-label="新建">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>
    <!-- 筛选条 -->
    <div class="filterbar">
      <button class="chip chip-active" data-filter="all">全部</button>
      <button class="chip" data-filter="pinned">钉选</button>
      <button class="chip" data-filter="unresolved">未沉</button>
      <button class="chip" data-filter="resolved">已沉</button>
      <button class="chip" data-filter="archive">归档</button>
    </div>
    <div class="searchbar">
      <input type="search" id="search-input" placeholder="搜索记忆 · 标题 / 内容 / 标签" autocomplete="off">
    </div>
  </header>

  <!-- 列表 -->
  <main class="list-container" id="list-container">
    <div class="empty" id="empty-state">
      <p class="empty-text">权重池平静</p>
      <p class="empty-hint">下拉刷新 · 或新建一条记忆</p>
    </div>
  </main>

  <!-- 状态条 -->
  <footer class="statusbar" id="statusbar">
    <span class="status-item" id="stat-permanent">钉 0</span>
    <span class="status-dot">·</span>
    <span class="status-item" id="stat-dynamic">动 0</span>
    <span class="status-dot">·</span>
    <span class="status-item" id="stat-archive">归 0</span>
    <span class="status-dot">·</span>
    <span class="status-item" id="stat-size">0 KB</span>
  </footer>
</section>

<!-- 详情/编辑 抽屉 -->
<div id="drawer" class="drawer hidden">
  <div class="drawer-backdrop"></div>
  <div class="drawer-panel">
    <header class="drawer-head">
      <button class="iconbtn" id="drawer-close" aria-label="关闭">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <h2 class="drawer-title" id="drawer-title">详情</h2>
      <button class="iconbtn" id="drawer-edit" aria-label="编辑">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 20h4l10-10-4-4L4 16v4z M14 6l4 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
      </button>
    </header>
    <div class="drawer-body" id="drawer-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<!-- 侧边菜单 -->
<div id="sidemenu" class="sidemenu hidden">
  <div class="sidemenu-backdrop"></div>
  <div class="sidemenu-panel">
    <div class="sidemenu-head">
      <p class="sidemenu-user" id="menu-user">·</p>
    </div>
    <nav class="sidemenu-nav">
      <button class="menu-item" id="menu-refresh">
        <span>刷新</span>
      </button>
      <button class="menu-item" id="menu-archive-toggle">
        <span>显示归档</span>
        <span class="menu-state" id="menu-archive-state">关</span>
      </button>
      <button class="menu-item menu-danger" id="menu-logout">
        <span>登出</span>
      </button>
    </nav>
    <div class="sidemenu-foot">
      <p class="foot-tip">Ombre Brain · 长期记忆系统</p>
      <p class="foot-tip foot-tip-dim" id="foot-version"></p>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
